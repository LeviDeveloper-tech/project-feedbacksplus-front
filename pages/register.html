<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <link rel="stylesheet" href="../src/css/register.css">
</head>

<body>
    <header>
        <h1>
            Cadastre-se
        </h1>
    </header>
    <form action="" method="post">
        <div>
            <label for="input-name">Digite seu nome</label>
            <input type="text" id="input">
        </div>

        <div>
            <label for="input-date">Data de nascimento</label>
            <input type="number" id="input-date" placeholder="dd/MM/aaaa">
        </div>

        <div>
            <label for="input-cpf">Digite seu cpf</label>
            <input type="text" id="input-cpf" placeholder="xxx.xxx.xxx-xx">
        </div>

        <div>
            <label for="input-telefone">Digite seu numero de telefone</label>
            <input type="text" id="input-telefone" placeholder="(xx) xxxxx-xxxx">
        </div>

        <div>
            <label for="input-user">Crie um nome de usuário:</label>
            <input type="text" name="" id="input-user">
        </div>

        <div>
            <label for="input-password">Crie uma senha</label>
            <input type="password" id="input-password">
        </div>

        <div>
            <label for="confirm-password">Confirme sua senha</label>
            <input type="password" id="confirm-password">
        </div>

        <button type="button">Enviar</button>
        <a href="../index.html" rel="noopener noreferrer">Voltar</a>

    </form>
