<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <link rel="stylesheet" href="../src/css/register.css">
</head>

<body>
    <header>
        <h1>
            Cadastre-se
        </h1>
    </header>
    <form action="" method="post">
        <div>
            <label for="nome">Digite seu nome</label>
            <input type="text" id="nome">
        </div>

        <div>
            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" placeholder="data de nascimento">
        </div>

        <div>
            <label for="cpf">Digite seu cpf</label>
            <input type="text" id="cpf" placeholder="xxx.xxx.xxx-xx">
        </div>

        <div>
            <label for="telefone">Digite seu numero de telefone</label>
            <input type="text" id="telefone" placeholder="(xx) xxxxx-xxxx">
        </div>

        <div>
            <label for="login">Crie um nome de usuário - (login):</label>
            <input type="text" name="" id="login">
        </div>

        <div>
            <label for="senha">Crie uma senha</label>
            <input type="password" id="senha">
        </div>

        <div>
            <label for="confirmar-senha">Confirme sua senha</label>
            <input type="password" id="confirmar-senha">
        </div>

        <button type="submit" id="button">Enviar</button>
        <a href="../index.html" rel="noopener noreferrer">Voltar</a>

    </form>


<div id="modal-revisao" class="modal-overlay">
    <div class="modal-content">
        <h3>Confira seus dados:</h3>
        <div id="lista-revisao"></div>
        
        <div class="modal-actions">
            <button id="confirmar-final" class="btn-confirm">Confirmar e Enviar</button>
            <button type="button" class="btn-cancel" onclick="document.getElementById('modal-revisao').style.display='none'">
                Cancelar e Editar
            </button>
        </div>
    </div>
</div>
    <script type="module" src="../src/js/register.js"></script>

</body>
