<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/index.css">
    <title>Feedback Plus</title>
</head>

<body>
    <header>
        <h1>Feedback Plus</h1>
        <h5>Aqui sua voz é nossa prioridade!</h5>
    </header>
    <section id="main-section">
        <form id="form-login">
            <h2>Login</h2>
            
            <div id="username-div">
                <label for="username-input" id="username-h3">Usuário</label>
                <input type="text" id="username-input" name="login" placeholder="Digite seu usuário" required>
            </div>
            
            <div id="password-div">
                <label for="password-input" id="password-h3">Senha</label>
                <input type="password" id="password-input" name="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" id="btn-form">Entrar</button>
            
            <p>Não tem conta? <br>
                <a href="./pages/register.html">Clique aqui e crie a sua!</a>
            </p>
        </form>
    </section>

    <script src="./src/js/login.js" defer></script>
</body>
</html>
